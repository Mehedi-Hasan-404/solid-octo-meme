name: Build M3U8 Downloader APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/example/m3u8downloader
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

      - name: Write settings.gradle
        run: |
          cat > settings.gradle <<'SETTINGS_GRADLE'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          rootProject.name = "M3U8Downloader"
          include ':app'
          SETTINGS_GRADLE

      - name: Write root build.gradle
        run: |
          cat > build.gradle <<'ROOT_BUILD_GRADLE'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.5.2'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.24'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          ROOT_BUILD_GRADLE

      - name: Write gradle.properties
        run: |
          cat > gradle.properties <<'GRADLE_PROPERTIES'
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          kotlin.code.style=official
          org.gradle.jvmargs=-Xmx2048m
          GRADLE_PROPERTIES

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Write app build.gradle
        run: |
          cat > app/build.gradle <<'APP_BUILD_GRADLE'
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'

          android {
              namespace 'com.example.m3u8downloader'
              compileSdk 34

              defaultConfig {
                  applicationId "com.example.m3u8downloader"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  debug {}
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }

              buildFeatures {
                  viewBinding true
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.13.1'
              implementation 'androidx.appcompat:appcompat:1.7.0'
              implementation 'com.google.android.material:material:1.12.0'
              implementation 'androidx.activity:activity-ktx:1.9.0'
              implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.8.4'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.0'
              implementation 'androidx.media3:media3-transformer:1.4.1'
              implementation 'androidx.media3:media3-common:1.4.1'
              implementation 'androidx.media3:media3-effect:1.4.1'
              implementation 'androidx.media3:media3-exoplayer:1.4.1'
              implementation 'androidx.media3:media3-ui:1.4.1'
          }
          APP_BUILD_GRADLE

      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml <<'ANDROID_MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS" />

              <application
                  android:allowBackup="true"
                  android:largeHeap="true"
                  android:icon="@android:drawable/sym_def_app_icon"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.M3U8Downloader">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".DownloadService"
                      android:exported="false"
                      android:foregroundServiceType="dataSync" />
              </application>
          </manifest>
          ANDROID_MANIFEST

      - name: Write strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml <<'STRINGS_XML'
          <resources>
              <string name="app_name">M3U8 Downloader</string>
          </resources>
          STRINGS_XML

      - name: Write themes.xml
        run: |
          cat > app/src/main/res/values/themes.xml <<'THEMES_XML'
          <resources>
              <style name="Theme.M3U8Downloader" parent="Theme.Material3.DayNight.NoActionBar" />
          </resources>
          THEMES_XML

      - name: Write activity_main.xml
        run: |
          cat > app/src/main/res/layout/activity_main.xml <<'ACTIVITY_MAIN_XML'
          <?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent">

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:padding="16dp">

                  <EditText
                      android:id="@+id/editUrl"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:hint="M3U8 URL"
                      android:inputType="textUri" />

                  <EditText
                      android:id="@+id/editReferer"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="8dp"
                      android:hint="Referer (optional)"
                      android:inputType="textUri" />

                  <EditText
                      android:id="@+id/editOrigin"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="8dp"
                      android:hint="Origin (optional)"
                      android:inputType="textUri" />

                  <EditText
                      android:id="@+id/editCookie"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="8dp"
                      android:hint="Cookie (optional)"
                      android:inputType="text" />

                  <EditText
                      android:id="@+id/editUserAgent"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="8dp"
                      android:hint="User-Agent (optional, default Chrome desktop)"
                      android:inputType="text" />

                  <EditText
                      android:id="@+id/editOutputName"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="8dp"
                      android:hint="Output file name (optional)"
                      android:inputType="text" />

                  <Button
                      android:id="@+id/buttonDownload"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="16dp"
                      android:text="Download and Convert" />

                  <Button
                      android:id="@+id/buttonCancel"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="8dp"
                      android:text="Cancel"
                      android:visibility="gone" />

                  <ProgressBar
                      android:id="@+id/progressBar"
                      style="@android:style/Widget.ProgressBar.Horizontal"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="16dp"
                      android:max="100"
                      android:visibility="gone" />

                  <TextView
                      android:id="@+id/textStatus"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="8dp" />

                  <androidx.media3.ui.PlayerView
                      android:id="@+id/playerView"
                      android:layout_width="match_parent"
                      android:layout_height="220dp"
                      android:layout_marginTop="8dp"
                      android:visibility="gone"
                      app:use_controller="true" />

              </LinearLayout>
          </ScrollView>
          ACTIVITY_MAIN_XML

      - name: Write MainActivity.kt
        run: |
          cat > app/src/main/java/com/example/m3u8downloader/MainActivity.kt <<'MAIN_ACTIVITY'
          package com.example.m3u8downloader

          import android.Manifest
          import android.content.Intent
          import android.content.pm.PackageManager
          import android.net.Uri
          import android.os.Build
          import android.os.Bundle
          import android.os.PowerManager
          import android.provider.Settings
          import android.view.View
          import android.widget.Toast
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.content.ContextCompat
          import androidx.lifecycle.Lifecycle
          import androidx.lifecycle.lifecycleScope
          import androidx.lifecycle.repeatOnLifecycle
          import androidx.media3.common.MediaItem
          import androidx.media3.exoplayer.ExoPlayer
          import com.example.m3u8downloader.databinding.ActivityMainBinding
          import kotlinx.coroutines.launch
          import java.io.File

          class MainActivity : AppCompatActivity() {

              private lateinit var binding: ActivityMainBinding
              private var player: ExoPlayer? = null
              private var pendingStart: (() -> Unit)? = null

              private val notificationPermissionLauncher =
                  registerForActivityResult(ActivityResultContracts.RequestPermission()) {
                      pendingStart?.invoke()
                      pendingStart = null
                  }

              private val batteryOptimizationLauncher =
                  registerForActivityResult(ActivityResultContracts.StartActivityForResult()) {
                      requestNotificationPermissionAndStart()
                  }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityMainBinding.inflate(layoutInflater)
                  setContentView(binding.root)

                  binding.buttonDownload.setOnClickListener {
                      requestPermissionAndStart()
                  }

                  binding.buttonCancel.setOnClickListener {
                      cancelDownload()
                  }

                  observeDownloadState()
              }

              private fun cancelDownload() {
                  binding.buttonCancel.isEnabled = false
                  binding.textStatus.text = "Cancelling..."
                  val intent = Intent(this, DownloadService::class.java).apply {
                      action = DownloadService.ACTION_CANCEL
                  }
                  startService(intent)
              }

              private fun setActiveUiState() {
                  binding.progressBar.visibility = View.VISIBLE
                  binding.buttonDownload.isEnabled = false
                  binding.buttonCancel.visibility = View.VISIBLE
                  binding.buttonCancel.isEnabled = true
              }

              private fun setIdleUiState() {
                  binding.progressBar.visibility = View.GONE
                  binding.buttonDownload.isEnabled = true
                  binding.buttonCancel.visibility = View.GONE
              }

              private fun requestPermissionAndStart() {
                  requestBatteryOptimizationExemption()
              }

              private fun requestBatteryOptimizationExemption() {
                  val powerManager = getSystemService(POWER_SERVICE) as PowerManager
                  if (!powerManager.isIgnoringBatteryOptimizations(packageName)) {
                      val intent = Intent(Settings.ACTION_REQUEST_IGNORE_BATTERY_OPTIMIZATIONS).apply {
                          data = Uri.parse("package:$packageName")
                      }
                      try {
                          batteryOptimizationLauncher.launch(intent)
                      } catch (e: Exception) {
                          requestNotificationPermissionAndStart()
                      }
                  } else {
                      requestNotificationPermissionAndStart()
                  }
              }

              private fun requestNotificationPermissionAndStart() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU &&
                      ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS)
                      != PackageManager.PERMISSION_GRANTED
                  ) {
                      pendingStart = { startDownload() }
                      notificationPermissionLauncher.launch(Manifest.permission.POST_NOTIFICATIONS)
                  } else {
                      startDownload()
                  }
              }

              private fun startDownload() {
                  val url = binding.editUrl.text.toString().trim()
                  if (url.isEmpty()) {
                      Toast.makeText(this, "Enter a .m3u8 URL", Toast.LENGTH_SHORT).show()
                      return
                  }
                  if (!url.startsWith("http://") && !url.startsWith("https://")) {
                      Toast.makeText(this, "URL must start with http:// or https://", Toast.LENGTH_SHORT).show()
                      return
                  }

                  val referer = binding.editReferer.text.toString().trim().ifBlank { null }
                  val origin = binding.editOrigin.text.toString().trim().ifBlank { null }
                  val cookie = binding.editCookie.text.toString().trim().ifBlank { null }
                  val userAgent = binding.editUserAgent.text.toString().trim().ifBlank {
                      "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
                  }
                  val outputName = binding.editOutputName.text.toString().trim().ifBlank {
                      "m3u8_${System.currentTimeMillis()}"
                  }.replace(Regex("[^A-Za-z0-9_-]"), "_")

                  setActiveUiState()
                  binding.progressBar.progress = 0
                  binding.playerView.visibility = View.GONE
                  binding.textStatus.text = "Starting background download..."

                  val intent = Intent(this, DownloadService::class.java).apply {
                      action = DownloadService.ACTION_START
                      putExtra(DownloadService.EXTRA_URL, url)
                      putExtra(DownloadService.EXTRA_REFERER, referer)
                      putExtra(DownloadService.EXTRA_ORIGIN, origin)
                      putExtra(DownloadService.EXTRA_COOKIE, cookie)
                      putExtra(DownloadService.EXTRA_USER_AGENT, userAgent)
                      putExtra(DownloadService.EXTRA_OUTPUT_NAME, outputName)
                  }
                  ContextCompat.startForegroundService(this, intent)
              }

              // Download and conversion now run inside DownloadService, which keeps working
              // even if this Activity is stopped, backgrounded, or destroyed. We just observe
              // its state here to drive the UI whenever the Activity is visible.
              private fun observeDownloadState() {
                  lifecycleScope.launch {
                      repeatOnLifecycle(Lifecycle.State.STARTED) {
                          DownloadService.state.collect { state ->
                              when (state) {
                                  is DownloadState.Idle -> Unit

                                  is DownloadState.FetchingPlaylist -> {
                                      setActiveUiState()
                                      binding.textStatus.text = if (state.retryAttempt > 0) {
                                          "${state.message} (retry #${state.retryAttempt})"
                                      } else {
                                          state.message
                                      }
                                  }

                                  is DownloadState.Downloading -> {
                                      setActiveUiState()
                                      binding.progressBar.progress =
                                          if (state.total > 0) state.done * 100 / state.total else 0
                                      binding.textStatus.text = if (state.retryAttempt > 0) {
                                          "Downloaded ${state.done}/${state.total} segments (retry #${state.retryAttempt})"
                                      } else {
                                          "Downloaded ${state.done}/${state.total} segments"
                                      }
                                  }

                                  is DownloadState.Converting -> {
                                      setActiveUiState()
                                      binding.progressBar.progress = state.percent
                                      binding.textStatus.text = "Converting: ${state.percent}%"
                                  }

                                  is DownloadState.Completed -> {
                                      setIdleUiState()
                                      binding.textStatus.text = "Saved to ${state.path}"
                                      previewVideo(Uri.fromFile(File(state.path)))
                                  }

                                  is DownloadState.Cancelled -> {
                                      setIdleUiState()
                                      binding.textStatus.text = "Download cancelled"
                                  }

                                  is DownloadState.Failed -> {
                                      setIdleUiState()
                                      binding.textStatus.text = "Failed: ${state.message}"
                                  }
                              }
                          }
                      }
                  }
              }

              private fun previewVideo(uri: Uri) {
                  player?.release()
                  val exoPlayer = ExoPlayer.Builder(this).build()
                  exoPlayer.setMediaItem(MediaItem.fromUri(uri))
                  exoPlayer.prepare()
                  binding.playerView.player = exoPlayer
                  binding.playerView.visibility = View.VISIBLE
                  player = exoPlayer
              }

              override fun onStop() {
                  super.onStop()
                  player?.pause()
              }

              override fun onDestroy() {
                  super.onDestroy()
                  player?.release()
                  player = null
              }
          }
          MAIN_ACTIVITY

      - name: Write DownloadService.kt
        run: |
          cat > app/src/main/java/com/example/m3u8downloader/DownloadService.kt <<'DOWNLOAD_SERVICE'
          package com.example.m3u8downloader

          import android.app.Notification
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.app.PendingIntent
          import android.app.Service
          import android.content.Intent
          import android.content.pm.ServiceInfo
          import android.net.Uri
          import android.os.Build
          import android.os.Environment
          import android.os.Handler
          import android.os.IBinder
          import android.os.Looper
          import android.os.PowerManager
          import androidx.core.app.NotificationCompat
          import androidx.media3.common.MediaItem
          import androidx.media3.common.MimeTypes
          import androidx.media3.transformer.Composition
          import androidx.media3.transformer.EditedMediaItem
          import androidx.media3.transformer.ExportException
          import androidx.media3.transformer.ExportResult
          import androidx.media3.transformer.ProgressHolder
          import androidx.media3.transformer.Transformer
          import kotlinx.coroutines.CancellationException
          import kotlinx.coroutines.CoroutineScope
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.Job
          import kotlinx.coroutines.SupervisorJob
          import kotlinx.coroutines.async
          import kotlinx.coroutines.coroutineScope
          import kotlinx.coroutines.delay
          import kotlinx.coroutines.flow.MutableStateFlow
          import kotlinx.coroutines.flow.StateFlow
          import kotlinx.coroutines.flow.asStateFlow
          import kotlinx.coroutines.launch
          import kotlinx.coroutines.sync.Mutex
          import kotlinx.coroutines.sync.Semaphore
          import kotlinx.coroutines.sync.withLock
          import kotlinx.coroutines.sync.withPermit
          import kotlinx.coroutines.withContext
          import java.io.File
          import java.io.RandomAccessFile
          import java.net.HttpURLConnection
          import java.net.URI
          import java.net.URL
          import java.security.MessageDigest
          import java.util.Collections
          import java.util.concurrent.atomic.AtomicInteger
          import javax.crypto.Cipher
          import javax.crypto.spec.IvParameterSpec
          import javax.crypto.spec.SecretKeySpec

          data class Variant(val bandwidth: Long, val url: String)
          data class Segment(val url: String, val keyUri: String?, val keyMethod: String?, val keyIv: String?)

          sealed class DownloadState {
              object Idle : DownloadState()
              data class FetchingPlaylist(val message: String = "Fetching playlist...", val retryAttempt: Int = 0) : DownloadState()
              data class Downloading(val done: Int, val total: Int, val retryAttempt: Int = 0) : DownloadState()
              data class Converting(val percent: Int) : DownloadState()
              data class Completed(val path: String) : DownloadState()
              object Cancelled : DownloadState()
              data class Failed(val message: String) : DownloadState()
          }

          /**
           * Runs the M3U8 download + decrypt + remux pipeline as a foreground service so it keeps
           * running even after the user backgrounds or closes the Activity. Progress is published
           * through [state], which MainActivity observes whenever it is visible.
           */
          class DownloadService : Service() {

              private val serviceJob = SupervisorJob()
              private val serviceScope = CoroutineScope(Dispatchers.IO + serviceJob)

              private var wakeLock: PowerManager.WakeLock? = null
              private var transformer: Transformer? = null
              private val progressHolder = ProgressHolder()
              private val progressHandler = Handler(Looper.getMainLooper())
              private var isRunning = false
              private var currentJob: Job? = null

              // Tracks in-flight HTTP connections so a cancel request can force them to fail
              // immediately instead of waiting out a connect/read timeout.
              private val activeConnections = Collections.synchronizedSet(mutableSetOf<HttpURLConnection>())

              companion object {
                  private const val CHANNEL_ID = "download_channel"
                  private const val NOTIFICATION_ID = 1
                  private const val INITIAL_RETRY_DELAY_MS = 1000L
                  private const val MAX_RETRY_DELAY_MS = 30_000L

                  const val ACTION_START = "com.example.m3u8downloader.action.START"
                  const val ACTION_CANCEL = "com.example.m3u8downloader.action.CANCEL"
                  const val EXTRA_URL = "extra_url"
                  const val EXTRA_REFERER = "extra_referer"
                  const val EXTRA_ORIGIN = "extra_origin"
                  const val EXTRA_COOKIE = "extra_cookie"
                  const val EXTRA_USER_AGENT = "extra_user_agent"
                  const val EXTRA_OUTPUT_NAME = "extra_output_name"

                  private val _state = MutableStateFlow<DownloadState>(DownloadState.Idle)
                  val state: StateFlow<DownloadState> = _state.asStateFlow()
              }

              private val progressRunnable = object : Runnable {
                  override fun run() {
                      val progressState = transformer?.getProgress(progressHolder)
                      if (progressState == Transformer.PROGRESS_STATE_AVAILABLE) {
                          _state.value = DownloadState.Converting(progressHolder.progress)
                          updateNotification("Converting: ${progressHolder.progress}%", progressHolder.progress, false)
                          progressHandler.postDelayed(this, 300)
                      } else if (progressState != Transformer.PROGRESS_STATE_NOT_STARTED) {
                          progressHandler.postDelayed(this, 300)
                      }
                  }
              }

              override fun onCreate() {
                  super.onCreate()
                  createNotificationChannel()
              }

              override fun onBind(intent: Intent?): IBinder? = null

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  if (intent?.action == ACTION_CANCEL) {
                      cancelDownload()
                      return START_NOT_STICKY
                  }

                  if (intent?.action == ACTION_START && !isRunning) {
                      val url = intent.getStringExtra(EXTRA_URL)
                      val userAgent = intent.getStringExtra(EXTRA_USER_AGENT).orEmpty()
                      if (url == null) {
                          stopSelf()
                          return START_NOT_STICKY
                      }
                      val referer = intent.getStringExtra(EXTRA_REFERER)
                      val origin = intent.getStringExtra(EXTRA_ORIGIN)
                      val cookie = intent.getStringExtra(EXTRA_COOKIE)
                      val outputName = intent.getStringExtra(EXTRA_OUTPUT_NAME) ?: "m3u8_${System.currentTimeMillis()}"

                      isRunning = true
                      _state.value = DownloadState.FetchingPlaylist()
                      startForegroundWithNotification(buildNotification("Starting download...", 0, true))
                      acquireWakeLock()

                      val outputDir = getExternalFilesDir(Environment.DIRECTORY_MOVIES)
                      val tsFile = File(outputDir, "$outputName.ts")
                      val mp4File = File(outputDir, "$outputName.mp4")

                      currentJob = serviceScope.launch {
                          try {
                              downloadToTs(url, referer, origin, cookie, userAgent, tsFile) { done, total, retryAttempt ->
                                  _state.value = DownloadState.Downloading(done, total, retryAttempt)
                                  val text = if (retryAttempt > 0) {
                                      "Downloading $done/$total segments (retry #$retryAttempt)"
                                  } else {
                                      "Downloading $done/$total segments"
                                  }
                                  updateNotification(text, if (total > 0) done * 100 / total else 0, false)
                              }
                              _state.value = DownloadState.Converting(0)
                              updateNotification("Converting...", 0, false)
                              withContext(Dispatchers.Main) {
                                  remuxToMp4(tsFile, mp4File)
                              }
                          } catch (e: CancellationException) {
                              // Cancellation is already handled synchronously by cancelDownload().
                          } catch (e: Throwable) {
                              val message = if (e is OutOfMemoryError) {
                                  "Out of memory — try a lower quality source or free up device memory"
                              } else {
                                  e.message ?: "Unknown error"
                              }
                              _state.value = DownloadState.Failed(message)
                              updateNotification("Failed: $message", 0, false)
                              finishService()
                          }
                      }
                  }
                  return START_NOT_STICKY
              }

              private fun cancelDownload() {
                  if (!isRunning) return
                  disconnectActiveConnections()
                  currentJob?.cancel()
                  transformer?.cancel()
                  progressHandler.removeCallbacks(progressRunnable)
                  _state.value = DownloadState.Cancelled
                  getSystemService(NotificationManager::class.java)
                      .notify(NOTIFICATION_ID, buildFinalNotification("Download cancelled"))
                  finishService()
              }

              private fun disconnectActiveConnections() {
                  synchronized(activeConnections) {
                      activeConnections.forEach { it.disconnect() }
                      activeConnections.clear()
                  }
              }

              private fun startForegroundWithNotification(notification: Notification) {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      startForeground(NOTIFICATION_ID, notification, ServiceInfo.FOREGROUND_SERVICE_TYPE_DATA_SYNC)
                  } else {
                      startForeground(NOTIFICATION_ID, notification)
                  }
              }

              private fun createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val channel = NotificationChannel(
                          CHANNEL_ID,
                          "Downloads",
                          NotificationManager.IMPORTANCE_LOW
                      ).apply {
                          description = "Shows M3U8 download and conversion progress"
                      }
                      getSystemService(NotificationManager::class.java).createNotificationChannel(channel)
                  }
              }

              private fun buildNotification(contentText: String, progress: Int, indeterminate: Boolean): Notification {
                  val openAppIntent = Intent(this, MainActivity::class.java).apply {
                      flags = Intent.FLAG_ACTIVITY_NEW_TASK or Intent.FLAG_ACTIVITY_CLEAR_TOP
                  }
                  val pendingIntent = PendingIntent.getActivity(
                      this, 0, openAppIntent,
                      PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE
                  )
                  return NotificationCompat.Builder(this, CHANNEL_ID)
                      .setContentTitle("M3U8 Downloader")
                      .setContentText(contentText)
                      .setSmallIcon(android.R.drawable.stat_sys_download)
                      .setProgress(100, progress, indeterminate)
                      .setOngoing(true)
                      .setOnlyAlertOnce(true)
                      .setContentIntent(pendingIntent)
                      .build()
              }

              private fun buildFinalNotification(contentText: String): Notification {
                  val openAppIntent = Intent(this, MainActivity::class.java).apply {
                      flags = Intent.FLAG_ACTIVITY_NEW_TASK or Intent.FLAG_ACTIVITY_CLEAR_TOP
                  }
                  val pendingIntent = PendingIntent.getActivity(
                      this, 0, openAppIntent,
                      PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE
                  )
                  return NotificationCompat.Builder(this, CHANNEL_ID)
                      .setContentTitle("M3U8 Downloader")
                      .setContentText(contentText)
                      .setSmallIcon(android.R.drawable.stat_sys_download_done)
                      .setOngoing(false)
                      .setAutoCancel(true)
                      .setContentIntent(pendingIntent)
                      .build()
              }

              private fun updateNotification(contentText: String, progress: Int, indeterminate: Boolean) {
                  val manager = getSystemService(NotificationManager::class.java)
                  manager.notify(NOTIFICATION_ID, buildNotification(contentText, progress, indeterminate))
              }

              private fun acquireWakeLock() {
                  val powerManager = getSystemService(POWER_SERVICE) as PowerManager
                  wakeLock = powerManager.newWakeLock(
                      PowerManager.PARTIAL_WAKE_LOCK,
                      "M3U8Downloader::DownloadWakeLock"
                  ).apply {
                      setReferenceCounted(false)
                      acquire(30 * 60 * 1000L)
                  }
              }

              private fun releaseWakeLock() {
                  if (wakeLock?.isHeld == true) wakeLock?.release()
                  wakeLock = null
              }

              private fun finishService() {
                  progressHandler.removeCallbacks(progressRunnable)
                  releaseWakeLock()
                  isRunning = false
                  currentJob = null
                  stopForeground(STOP_FOREGROUND_DETACH)
                  stopSelf()
              }

              private fun openConnection(
                  target: String,
                  referer: String?,
                  origin: String?,
                  cookie: String?,
                  userAgent: String
              ): HttpURLConnection {
                  val connection = URL(target).openConnection() as HttpURLConnection
                  connection.setRequestProperty("User-Agent", userAgent)
                  referer?.let { connection.setRequestProperty("Referer", it) }
                  origin?.let { connection.setRequestProperty("Origin", it) }
                  cookie?.let { connection.setRequestProperty("Cookie", it) }
                  connection.connectTimeout = 20000
                  connection.readTimeout = 30000
                  connection.instanceFollowRedirects = true
                  activeConnections.add(connection)
                  return connection
              }

              private fun fetchText(url: String, referer: String?, origin: String?, cookie: String?, userAgent: String): String {
                  val connection = openConnection(url, referer, origin, cookie, userAgent)
                  try {
                      connection.inputStream.use { return it.readBytes().toString(Charsets.UTF_8) }
                  } finally {
                      activeConnections.remove(connection)
                  }
              }

              private fun fetchBytes(url: String, referer: String?, origin: String?, cookie: String?, userAgent: String): ByteArray {
                  val connection = openConnection(url, referer, origin, cookie, userAgent)
                  try {
                      connection.inputStream.use { return it.readBytes() }
                  } finally {
                      activeConnections.remove(connection)
                  }
              }

              /**
               * Retries [block] forever with capped exponential backoff until it succeeds or the
               * enclosing coroutine is cancelled (e.g. via the Cancel button), in which case the
               * [CancellationException] is rethrown instead of retried.
               */
              private suspend fun <T> retryIndefinitely(
                  onRetry: (attempt: Int, error: Exception) -> Unit,
                  block: () -> T
              ): T {
                  var attempt = 0
                  var delayMs = INITIAL_RETRY_DELAY_MS
                  while (true) {
                      try {
                          return block()
                      } catch (e: CancellationException) {
                          throw e
                      } catch (e: Exception) {
                          attempt++
                          onRetry(attempt, e)
                          delay(delayMs)
                          delayMs = (delayMs * 2).coerceAtMost(MAX_RETRY_DELAY_MS)
                      }
                  }
              }

              private fun resolveUrl(baseUrl: String, ref: String): String {
                  return if (ref.startsWith("http://") || ref.startsWith("https://")) ref
                  else URI.create(baseUrl).resolve(ref).toString()
              }

              private fun parseVariants(content: String, baseUrl: String): List<Variant> {
                  val lines = content.lines().map { it.trim() }.filter { it.isNotEmpty() }
                  val variants = mutableListOf<Variant>()
                  var bandwidth = 0L
                  for (line in lines) {
                      if (line.startsWith("#EXT-X-STREAM-INF")) {
                          bandwidth = Regex("BANDWIDTH=(\\d+)").find(line)?.groupValues?.get(1)?.toLongOrNull() ?: 0L
                      } else if (!line.startsWith("#")) {
                          variants.add(Variant(bandwidth, resolveUrl(baseUrl, line)))
                      }
                  }
                  return variants.sortedByDescending { it.bandwidth }
              }

              private fun parseSegments(content: String, baseUrl: String): List<Segment> {
                  val lines = content.lines().map { it.trim() }.filter { it.isNotEmpty() }
                  val segments = mutableListOf<Segment>()
                  var keyUri: String? = null
                  var keyMethod: String? = null
                  var keyIv: String? = null
                  for (line in lines) {
                      when {
                          line.startsWith("#EXT-X-KEY") -> {
                              keyMethod = Regex("METHOD=([^,]+)").find(line)?.groupValues?.get(1)
                              keyUri = Regex("URI=\"([^\"]+)\"").find(line)?.groupValues?.get(1)?.let { resolveUrl(baseUrl, it) }
                              keyIv = Regex("IV=(0[xX][0-9A-Fa-f]+)").find(line)?.groupValues?.get(1)
                              if (keyMethod == "NONE") { keyUri = null; keyMethod = null; keyIv = null }
                          }
                          !line.startsWith("#") -> {
                              segments.add(Segment(resolveUrl(baseUrl, line), keyUri, keyMethod, keyIv))
                          }
                      }
                  }
                  return segments
              }

              private fun hexToBytes(hex: String): ByteArray {
                  val clean = if (hex.length % 2 != 0) "0$hex" else hex
                  return ByteArray(clean.length / 2) { i -> clean.substring(i * 2, i * 2 + 2).toInt(16).toByte() }
              }

              private suspend fun decrypt(
                  raw: ByteArray,
                  segment: Segment,
                  keyCache: MutableMap<String, ByteArray>,
                  keyCacheMutex: Mutex,
                  referer: String?,
                  origin: String?,
                  cookie: String?,
                  userAgent: String
              ): ByteArray {
                  if (segment.keyUri == null || segment.keyMethod != "AES-128") return raw
                  val key = keyCacheMutex.withLock {
                      keyCache[segment.keyUri] ?: retryIndefinitely(onRetry = { _, _ -> }) {
                          fetchBytes(segment.keyUri, referer, origin, cookie, userAgent)
                      }.also { keyCache[segment.keyUri] = it }
                  }
                  val iv = segment.keyIv?.removePrefix("0x")?.removePrefix("0X")?.let { hexToBytes(it) }
                      ?: MessageDigest.getInstance("MD5").digest(segment.url.toByteArray()).copyOf(16)
                  val cipher = Cipher.getInstance("AES/CBC/PKCS5Padding")
                  cipher.init(Cipher.DECRYPT_MODE, SecretKeySpec(key, "AES"), IvParameterSpec(iv))
                  return cipher.doFinal(raw)
              }

              private suspend fun downloadToTs(
                  sourceUrl: String,
                  referer: String?,
                  origin: String?,
                  cookie: String?,
                  userAgent: String,
                  outputTsFile: File,
                  onProgress: (done: Int, total: Int, retryAttempt: Int) -> Unit
              ): Int {
                  val onPlaylistRetry = { attempt: Int, _: Exception ->
                      _state.value = DownloadState.FetchingPlaylist(retryAttempt = attempt)
                      updateNotification("Fetching playlist... (retry #$attempt)", 0, true)
                  }

                  val rootContent = retryIndefinitely(onPlaylistRetry) {
                      fetchText(sourceUrl, referer, origin, cookie, userAgent)
                  }
                  val isMaster = rootContent.lines().any { it.trim().startsWith("#EXT-X-STREAM-INF") }

                  val (mediaUrl, mediaContent) = if (isMaster) {
                      val variants = parseVariants(rootContent, sourceUrl)
                      val chosen = variants.firstOrNull() ?: throw IllegalStateException("No variants found")
                      val content = retryIndefinitely(onPlaylistRetry) {
                          fetchText(chosen.url, referer, origin, cookie, userAgent)
                      }
                      chosen.url to content
                  } else {
                      sourceUrl to rootContent
                  }

                  val segments = parseSegments(mediaContent, mediaUrl)
                  if (segments.isEmpty()) throw IllegalStateException("No segments found in playlist")

                  val partsDir = File(outputTsFile.parentFile, "${outputTsFile.nameWithoutExtension}_parts")
                  partsDir.mkdirs()
                  val keyCache = mutableMapOf<String, ByteArray>()
                  val keyCacheMutex = Mutex()
                  val semaphore = Semaphore(6)
                  val completed = AtomicInteger(0)

                  try {
                      coroutineScope {
                          val jobs = segments.mapIndexed { index, segment ->
                              async {
                                  semaphore.withPermit {
                                      val raw = retryIndefinitely(onRetry = { attempt, _ ->
                                          onProgress(completed.get(), segments.size, attempt)
                                      }) {
                                          fetchBytes(segment.url, referer, origin, cookie, userAgent)
                                      }
                                      val decrypted = decrypt(raw, segment, keyCache, keyCacheMutex, referer, origin, cookie, userAgent)
                                      File(partsDir, "%06d.part".format(index)).writeBytes(decrypted)
                                      onProgress(completed.incrementAndGet(), segments.size, 0)
                                  }
                              }
                          }
                          jobs.forEach { it.await() }
                      }

                      RandomAccessFile(outputTsFile, "rw").use { raf ->
                          for (index in segments.indices) {
                              val part = File(partsDir, "%06d.part".format(index))
                              if (!part.exists()) throw IllegalStateException("Missing segment data")
                              raf.write(part.readBytes())
                              part.delete()
                          }
                      }
                  } finally {
                      partsDir.deleteRecursively()
                  }

                  return segments.size
              }

              private fun remuxToMp4(tsFile: File, mp4File: File) {
                  val mediaItem = MediaItem.fromUri(Uri.fromFile(tsFile))
                  val editedMediaItem = EditedMediaItem.Builder(mediaItem).build()

                  val newTransformer = Transformer.Builder(this)
                      .setVideoMimeType(MimeTypes.VIDEO_H264)
                      .setAudioMimeType(MimeTypes.AUDIO_AAC)
                      .addListener(object : Transformer.Listener {
                          override fun onCompleted(composition: Composition, result: ExportResult) {
                              // If the user already hit Cancel, finishService() has run and
                              // isRunning is false; don't clobber the Cancelled state.
                              if (!isRunning) return
                              tsFile.delete()
                              _state.value = DownloadState.Completed(mp4File.absolutePath)
                              getSystemService(NotificationManager::class.java)
                                  .notify(NOTIFICATION_ID, buildFinalNotification("Saved ${mp4File.name}"))
                              finishService()
                          }

                          override fun onError(
                              composition: Composition,
                              result: ExportResult,
                              exception: ExportException
                          ) {
                              if (!isRunning) return
                              _state.value = DownloadState.Failed(exception.message ?: "Conversion failed")
                              getSystemService(NotificationManager::class.java)
                                  .notify(NOTIFICATION_ID, buildFinalNotification("Conversion failed: ${exception.message}"))
                              finishService()
                          }
                      })
                      .build()

                  transformer = newTransformer
                  newTransformer.start(editedMediaItem, mp4File.absolutePath)
                  progressHandler.post(progressRunnable)
              }

              override fun onDestroy() {
                  super.onDestroy()
                  progressHandler.removeCallbacks(progressRunnable)
                  disconnectActiveConnections()
                  serviceJob.cancel()
                  releaseWakeLock()
                  transformer = null
                  currentJob = null
                  isRunning = false
              }
          }
          DOWNLOAD_SERVICE

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: m3u8-downloader-debug-apk
          path: app/build/outputs/apk/debug/*.apk
