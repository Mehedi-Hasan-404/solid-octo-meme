name: Build Video Converter APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/example/videoconverter
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

      - name: Write settings.gradle
        run: |
          cat > settings.gradle <<'SETTINGS_GRADLE'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          rootProject.name = "VideoConverter"
          include ':app'
          SETTINGS_GRADLE

      - name: Write root build.gradle
        run: |
          cat > build.gradle <<'ROOT_BUILD_GRADLE'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.5.2'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.24'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          ROOT_BUILD_GRADLE

      - name: Write gradle.properties
        run: |
          cat > gradle.properties <<'GRADLE_PROPERTIES'
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          kotlin.code.style=official
          org.gradle.jvmargs=-Xmx2048m
          GRADLE_PROPERTIES

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Write app build.gradle
        run: |
          cat > app/build.gradle <<'APP_BUILD_GRADLE'
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'

          android {
              namespace 'com.example.videoconverter'
              compileSdk 34

              defaultConfig {
                  applicationId "com.example.videoconverter"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  debug {}
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }

              buildFeatures {
                  viewBinding true
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.13.1'
              implementation 'androidx.appcompat:appcompat:1.7.0'
              implementation 'com.google.android.material:material:1.12.0'
              implementation 'androidx.activity:activity-ktx:1.9.0'
              implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.8.4'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.0'
              implementation 'androidx.media3:media3-transformer:1.4.1'
              implementation 'androidx.media3:media3-common:1.4.1'
              implementation 'androidx.media3:media3-effect:1.4.1'
              implementation 'androidx.media3:media3-exoplayer:1.4.1'
              implementation 'androidx.media3:media3-ui:1.4.1'
          }
          APP_BUILD_GRADLE

      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml <<'ANDROID_MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />

              <application
                  android:name=".VideoConverterApplication"
                  android:allowBackup="true"
                  android:largeHeap="true"
                  android:icon="@android:drawable/sym_def_app_icon"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.VideoConverter">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".ConvertService"
                      android:exported="false"
                      android:foregroundServiceType="dataSync" />
              </application>
          </manifest>
          ANDROID_MANIFEST

      - name: Write strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml <<'STRINGS_XML'
          <resources>
              <string name="app_name">Video Converter</string>
          </resources>
          STRINGS_XML

      - name: Write themes.xml
        run: |
          cat > app/src/main/res/values/themes.xml <<'THEMES_XML'
          <resources>
              <style name="Theme.VideoConverter" parent="Theme.Material3.DayNight.NoActionBar" />
          </resources>
          THEMES_XML

      - name: Write activity_main.xml
        run: |
          cat > app/src/main/res/layout/activity_main.xml <<'ACTIVITY_MAIN_XML'
          <?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent">

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:padding="16dp">

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="Input format" />

                  <Spinner
                      android:id="@+id/spinnerInputFormat"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content" />

                  <Button
                      android:id="@+id/buttonSelectFile"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="8dp"
                      android:text="Select Video File" />

                  <TextView
                      android:id="@+id/textSelectedFile"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="4dp"
                      android:text="No file selected" />

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="16dp"
                      android:text="Output format" />

                  <Spinner
                      android:id="@+id/spinnerOutputFormat"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content" />

                  <EditText
                      android:id="@+id/editOutputName"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="8dp"
                      android:hint="Output file name (optional)"
                      android:inputType="text" />

                  <com.google.android.material.switchmaterial.SwitchMaterial
                      android:id="@+id/switchSoftwareEncoder"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="16dp"
                      android:text="Use software encoder (slower, more compatible)"
                      android:checked="false" />

                  <Button
                      android:id="@+id/buttonConvert"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="16dp"
                      android:text="Convert" />

                  <Button
                      android:id="@+id/buttonCancel"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="8dp"
                      android:text="Cancel"
                      android:visibility="gone" />

                  <ProgressBar
                      android:id="@+id/progressBar"
                      style="@android:style/Widget.ProgressBar.Horizontal"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="16dp"
                      android:max="100"
                      android:visibility="gone" />

                  <TextView
                      android:id="@+id/textStatus"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="8dp" />

                  <androidx.media3.ui.PlayerView
                      android:id="@+id/playerView"
                      android:layout_width="match_parent"
                      android:layout_height="220dp"
                      android:layout_marginTop="8dp"
                      android:visibility="gone"
                      app:use_controller="true" />

              </LinearLayout>
          </ScrollView>
          ACTIVITY_MAIN_XML

      - name: Write MainActivity.kt
        run: |
          cat > app/src/main/java/com/example/videoconverter/MainActivity.kt <<'MAIN_ACTIVITY'
          package com.example.videoconverter

          import android.Manifest
          import android.content.Intent
          import android.content.pm.PackageManager
          import android.net.Uri
          import android.os.Build
          import android.os.Bundle
          import android.os.PowerManager
          import android.provider.OpenableColumns
          import android.provider.Settings
          import android.view.View
          import android.widget.ArrayAdapter
          import android.widget.Toast
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.content.ContextCompat
          import androidx.lifecycle.Lifecycle
          import androidx.lifecycle.lifecycleScope
          import androidx.lifecycle.repeatOnLifecycle
          import androidx.media3.common.MediaItem
          import androidx.media3.exoplayer.ExoPlayer
          import com.example.videoconverter.databinding.ActivityMainBinding
          import kotlinx.coroutines.launch

          class MainActivity : AppCompatActivity() {

              private lateinit var binding: ActivityMainBinding
              private var player: ExoPlayer? = null
              private var pendingStart: (() -> Unit)? = null
              private var selectedInputUri: Uri? = null

              private val inputFormats = listOf(
                  "Any video file" to arrayOf("video/*"),
                  "MP4 (.mp4)" to arrayOf("video/mp4"),
                  "M4V (.m4v)" to arrayOf("video/mp4", "video/x-m4v"),
                  "MOV (.mov)" to arrayOf("video/quicktime"),
                  "MKV (.mkv)" to arrayOf("video/x-matroska"),
                  "WEBM (.webm)" to arrayOf("video/webm"),
                  "TS (.ts)" to arrayOf("video/mp2t"),
                  "M2TS / MTS (.m2ts, .mts)" to arrayOf("video/mp2t"),
                  "3GP (.3gp)" to arrayOf("video/3gpp"),
                  "3G2 (.3g2)" to arrayOf("video/3gpp2"),
                  "FLV (.flv)" to arrayOf("video/x-flv"),
                  "OGV (.ogv)" to arrayOf("video/ogg"),
                  "AVI (.avi)" to arrayOf("video/avi", "video/x-msvideo"),
                  "WMV (.wmv)" to arrayOf("video/x-ms-wmv")
              )

              private val outputFormats = listOf(
                  "MP4 (.mp4)" to "mp4",
                  "M4V (.m4v)" to "m4v"
              )

              private val filePickerLauncher =
                  registerForActivityResult(ActivityResultContracts.OpenDocument()) { uri ->
                      if (uri != null) {
                          try {
                              contentResolver.takePersistableUriPermission(uri, Intent.FLAG_GRANT_READ_URI_PERMISSION)
                          } catch (e: SecurityException) {
                          }
                          selectedInputUri = uri
                          binding.textSelectedFile.text = queryDisplayName(uri) ?: uri.toString()
                          binding.buttonConvert.isEnabled = true
                      }
                  }

              private val notificationPermissionLauncher =
                  registerForActivityResult(ActivityResultContracts.RequestPermission()) {
                      pendingStart?.invoke()
                      pendingStart = null
                  }

              private val batteryOptimizationLauncher =
                  registerForActivityResult(ActivityResultContracts.StartActivityForResult()) {
                      requestNotificationPermissionAndStart()
                  }

              private val storagePermissionLauncher =
                  registerForActivityResult(ActivityResultContracts.RequestPermission()) {
                      startConversion()
                  }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityMainBinding.inflate(layoutInflater)
                  setContentView(binding.root)

                  binding.spinnerInputFormat.adapter = ArrayAdapter(
                      this, android.R.layout.simple_spinner_dropdown_item, inputFormats.map { it.first }
                  )
                  binding.spinnerOutputFormat.adapter = ArrayAdapter(
                      this, android.R.layout.simple_spinner_dropdown_item, outputFormats.map { it.first }
                  )

                  binding.buttonSelectFile.setOnClickListener {
                      // Always request all file types instead of filtering by the spinner's MIME
                      // types. Many document providers (download managers, HLS downloader apps,
                      // etc.) report files with no extension or the wrong MIME type, which causes
                      // ACTION_OPEN_DOCUMENT to grey them out even when they're valid videos. The
                      // spinner selection is still used later to decide how to treat the file; it
                      // no longer restricts what's selectable in the picker.
                      filePickerLauncher.launch(arrayOf("*/*"))
                  }

                  binding.buttonConvert.setOnClickListener {
                      requestPermissionAndStart()
                  }

                  binding.buttonCancel.setOnClickListener {
                      cancelConversion()
                  }

                  binding.buttonConvert.isEnabled = false

                  observeConversionState()
              }

              private fun queryDisplayName(uri: Uri): String? {
                  return contentResolver.query(uri, null, null, null, null)?.use { cursor ->
                      val nameIndex = cursor.getColumnIndex(OpenableColumns.DISPLAY_NAME)
                      if (nameIndex >= 0 && cursor.moveToFirst()) cursor.getString(nameIndex) else null
                  }
              }

              private fun cancelConversion() {
                  binding.buttonCancel.isEnabled = false
                  binding.textStatus.text = "Cancelling..."
                  val intent = Intent(this, ConvertService::class.java).apply {
                      action = ConvertService.ACTION_CANCEL
                  }
                  startService(intent)
              }

              private fun setActiveUiState() {
                  binding.progressBar.visibility = View.VISIBLE
                  binding.buttonConvert.isEnabled = false
                  binding.buttonSelectFile.isEnabled = false
                  binding.buttonCancel.visibility = View.VISIBLE
                  binding.buttonCancel.isEnabled = true
              }

              private fun setIdleUiState() {
                  binding.progressBar.visibility = View.GONE
                  binding.buttonConvert.isEnabled = selectedInputUri != null
                  binding.buttonSelectFile.isEnabled = true
                  binding.buttonCancel.visibility = View.GONE
              }

              private fun requestPermissionAndStart() {
                  if (selectedInputUri == null) {
                      Toast.makeText(this, "Select a video file first", Toast.LENGTH_SHORT).show()
                      return
                  }
                  requestBatteryOptimizationExemption()
              }

              private fun requestBatteryOptimizationExemption() {
                  val powerManager = getSystemService(POWER_SERVICE) as PowerManager
                  if (!powerManager.isIgnoringBatteryOptimizations(packageName)) {
                      val intent = Intent(Settings.ACTION_REQUEST_IGNORE_BATTERY_OPTIMIZATIONS).apply {
                          data = Uri.parse("package:$packageName")
                      }
                      try {
                          batteryOptimizationLauncher.launch(intent)
                      } catch (e: Exception) {
                          requestNotificationPermissionAndStart()
                      }
                  } else {
                      requestNotificationPermissionAndStart()
                  }
              }

              private fun requestNotificationPermissionAndStart() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU &&
                      ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS)
                      != PackageManager.PERMISSION_GRANTED
                  ) {
                      pendingStart = { requestStoragePermissionAndStart() }
                      notificationPermissionLauncher.launch(Manifest.permission.POST_NOTIFICATIONS)
                  } else {
                      requestStoragePermissionAndStart()
                  }
              }

              private fun requestStoragePermissionAndStart() {
                  if (Build.VERSION.SDK_INT <= Build.VERSION_CODES.P &&
                      ContextCompat.checkSelfPermission(this, Manifest.permission.WRITE_EXTERNAL_STORAGE)
                      != PackageManager.PERMISSION_GRANTED
                  ) {
                      storagePermissionLauncher.launch(Manifest.permission.WRITE_EXTERNAL_STORAGE)
                  } else {
                      startConversion()
                  }
              }

              private fun startConversion() {
                  val uri = selectedInputUri ?: return
                  val outputExtension = outputFormats[binding.spinnerOutputFormat.selectedItemPosition].second
                  val outputName = binding.editOutputName.text.toString().trim().ifBlank {
                      "converted_${System.currentTimeMillis()}"
                  }.replace(Regex("[^A-Za-z0-9_-]"), "_")

                  setActiveUiState()
                  binding.progressBar.progress = 0
                  binding.playerView.visibility = View.GONE
                  binding.textStatus.text = "Starting conversion..."

                  val intent = Intent(this, ConvertService::class.java).apply {
                      action = ConvertService.ACTION_START
                      putExtra(ConvertService.EXTRA_INPUT_URI, uri)
                      putExtra(ConvertService.EXTRA_OUTPUT_NAME, outputName)
                      putExtra(ConvertService.EXTRA_OUTPUT_EXTENSION, outputExtension)
                      putExtra(ConvertService.EXTRA_USE_SOFTWARE_ENCODER, binding.switchSoftwareEncoder.isChecked)
                  }
                  ContextCompat.startForegroundService(this, intent)
              }

              private fun observeConversionState() {
                  lifecycleScope.launch {
                      repeatOnLifecycle(Lifecycle.State.STARTED) {
                          ConvertService.state.collect { state ->
                              when (state) {
                                  is ConvertState.Idle -> Unit

                                  is ConvertState.Converting -> {
                                      setActiveUiState()
                                      binding.progressBar.progress = state.percent
                                      binding.textStatus.text = "Converting: ${state.percent}%"
                                  }

                                  is ConvertState.Completed -> {
                                      setIdleUiState()
                                      binding.textStatus.text = "Saved to Downloads/${state.displayName}"
                                      previewVideo(Uri.parse(state.path))
                                  }

                                  is ConvertState.Cancelled -> {
                                      setIdleUiState()
                                      binding.textStatus.text = "Conversion cancelled"
                                  }

                                  is ConvertState.Failed -> {
                                      setIdleUiState()
                                      binding.textStatus.text = "Failed: ${state.message}"
                                  }
                              }
                          }
                      }
                  }
              }

              private fun previewVideo(uri: Uri) {
                  player?.release()
                  val exoPlayer = ExoPlayer.Builder(this).build()
                  exoPlayer.setMediaItem(MediaItem.fromUri(uri))
                  exoPlayer.prepare()
                  binding.playerView.player = exoPlayer
                  binding.playerView.visibility = View.VISIBLE
                  player = exoPlayer
              }

              override fun onStop() {
                  super.onStop()
                  player?.pause()
              }

              override fun onDestroy() {
                  super.onDestroy()
                  player?.release()
                  player = null
              }
          }
          MAIN_ACTIVITY

      - name: Write VideoConverterApplication.kt
        run: |
          cat > app/src/main/java/com/example/videoconverter/VideoConverterApplication.kt <<'APPLICATION_KT'
          package com.example.videoconverter

          import android.Manifest
          import android.app.Application
          import android.content.ContentValues
          import android.content.pm.PackageManager
          import android.os.Build
          import android.os.Environment
          import android.provider.MediaStore
          import androidx.core.content.ContextCompat
          import java.io.File
          import java.io.PrintWriter
          import java.io.StringWriter
          import java.text.SimpleDateFormat
          import java.util.Date
          import java.util.Locale

          /**
           * Catches any uncaught exception anywhere in the app (not just inside ConvertService)
           * and writes a plain-text crash report to the Downloads folder before letting the
           * previous handler run (which normally still shows the system "app has stopped" dialog
           * and kills the process — this only adds a log alongside that, it doesn't prevent it).
           */
          class VideoConverterApplication : Application() {

              override fun onCreate() {
                  super.onCreate()
                  installCrashLogger()
              }

              private fun installCrashLogger() {
                  val previousHandler = Thread.getDefaultUncaughtExceptionHandler()
                  Thread.setDefaultUncaughtExceptionHandler { thread, throwable ->
                      try {
                          writeCrashReport(thread, throwable)
                      } catch (e: Exception) {
                          // Never let the logger itself throw and mask the real crash.
                      }
                      previousHandler?.uncaughtException(thread, throwable)
                  }
              }

              private fun writeCrashReport(thread: Thread, throwable: Throwable) {
                  val sw = StringWriter()
                  throwable.printStackTrace(PrintWriter(sw))
                  val stackTrace = sw.toString()

                  val timestamp = SimpleDateFormat("yyyy-MM-dd_HH-mm-ss", Locale.US).format(Date())
                  val versionName = try {
                      packageManager.getPackageInfo(packageName, 0).versionName
                  } catch (e: Exception) {
                      "unknown"
                  }

                  val report = buildString {
                      appendLine("=== CRASH REPORT ===")
                      appendLine("Time: $timestamp")
                      appendLine("Thread: ${thread.name}")
                      appendLine("Device: ${Build.MANUFACTURER} ${Build.MODEL}")
                      appendLine("Android: ${Build.VERSION.RELEASE} (SDK ${Build.VERSION.SDK_INT})")
                      appendLine("App Version: $versionName")
                      appendLine("====================")
                      appendLine()
                      appendLine(stackTrace)
                  }

                  val fileName = "crash_$timestamp.txt"

                  // Public Downloads dir requires MediaStore on API 29+ (scoped storage); the
                  // direct File path only works on API 28 and below, matching the same split
                  // used elsewhere in this app (see ConvertService.saveToDownloads).
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      val values = ContentValues().apply {
                          put(MediaStore.MediaColumns.DISPLAY_NAME, fileName)
                          put(MediaStore.MediaColumns.MIME_TYPE, "text/plain")
                          put(MediaStore.MediaColumns.RELATIVE_PATH, Environment.DIRECTORY_DOWNLOADS)
                      }
                      val uri = contentResolver.insert(MediaStore.Downloads.EXTERNAL_CONTENT_URI, values)
                      uri?.let {
                          contentResolver.openOutputStream(it)?.use { out ->
                              out.write(report.toByteArray())
                          }
                      }
                  } else {
                      val hasPermission = ContextCompat.checkSelfPermission(
                          this, Manifest.permission.WRITE_EXTERNAL_STORAGE
                      ) == PackageManager.PERMISSION_GRANTED

                      if (hasPermission) {
                          val downloadsDir = Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOWNLOADS)
                          if (!downloadsDir.exists()) downloadsDir.mkdirs()
                          File(downloadsDir, fileName).writeText(report)
                      } else {
                          // Permission not granted yet (e.g. crash happened before the user ever
                          // started a conversion, so they were never prompted). Fall back to
                          // app-private external storage, which needs no permission, so the log
                          // isn't lost — it just won't show up in the Downloads folder. It can
                          // still be pulled via `adb shell run-as` or a file manager with root/
                          // access, or simply found once WRITE_EXTERNAL_STORAGE is later granted
                          // and a subsequent crash writes to the real Downloads folder instead.
                          val fallbackDir = getExternalFilesDir(Environment.DIRECTORY_DOWNLOADS)
                          if (fallbackDir != null) {
                              if (!fallbackDir.exists()) fallbackDir.mkdirs()
                              File(fallbackDir, fileName).writeText(report)
                          }
                      }
                  }
              }
          }
          APPLICATION_KT

      - name: Write ConvertService.kt
        run: |
          cat > app/src/main/java/com/example/videoconverter/ConvertService.kt <<'CONVERT_SERVICE'
          package com.example.videoconverter

          import android.app.Notification
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.app.PendingIntent
          import android.app.Service
          import android.content.ContentValues
          import android.content.Intent
          import android.content.pm.ServiceInfo
          import android.media.MediaCodecInfo
          import android.media.MediaScannerConnection
          import android.net.Uri
          import android.os.Build
          import android.os.Environment
          import android.os.Handler
          import android.os.IBinder
          import android.os.Looper
          import android.os.PowerManager
          import android.provider.MediaStore
          import android.provider.OpenableColumns
          import androidx.core.app.NotificationCompat
          import androidx.media3.common.MediaItem
          import androidx.media3.common.MimeTypes
          import androidx.media3.transformer.Composition
          import androidx.media3.transformer.DefaultEncoderFactory
          import androidx.media3.transformer.EditedMediaItem
          import androidx.media3.transformer.EncoderSelector
          import androidx.media3.transformer.ExportException
          import androidx.media3.transformer.ExportResult
          import androidx.media3.transformer.ProgressHolder
          import androidx.media3.transformer.Transformer
          import java.util.Locale
          import kotlinx.coroutines.CancellationException
          import kotlinx.coroutines.CoroutineScope
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.Job
          import kotlinx.coroutines.SupervisorJob
          import kotlinx.coroutines.flow.MutableStateFlow
          import kotlinx.coroutines.flow.StateFlow
          import kotlinx.coroutines.flow.asStateFlow
          import kotlinx.coroutines.launch
          import kotlinx.coroutines.withContext
          import java.io.File
          import java.io.IOException

          sealed class ConvertState {
              object Idle : ConvertState()
              data class Converting(val percent: Int) : ConvertState()
              data class Completed(val path: String, val displayName: String) : ConvertState()
              object Cancelled : ConvertState()
              data class Failed(val message: String) : ConvertState()
          }

          private fun Intent.getInputUriExtra(key: String): Uri? {
              return if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                  getParcelableExtra(key, Uri::class.java)
              } else {
                  @Suppress("DEPRECATION")
                  getParcelableExtra(key)
              }
          }

          class ConvertService : Service() {

              private val serviceJob = SupervisorJob()
              private val serviceScope = CoroutineScope(Dispatchers.IO + serviceJob)

              private var wakeLock: PowerManager.WakeLock? = null
              private var transformer: Transformer? = null
              private val progressHolder = ProgressHolder()
              private val progressHandler = Handler(Looper.getMainLooper())
              private var isRunning = false
              private var currentJob: Job? = null
              private var outputMp4File: File? = null

              companion object {
                  private const val CHANNEL_ID = "convert_channel"
                  private const val NOTIFICATION_ID = 2

                  const val ACTION_START = "com.example.videoconverter.action.START"
                  const val ACTION_CANCEL = "com.example.videoconverter.action.CANCEL"
                  const val EXTRA_INPUT_URI = "extra_input_uri"
                  const val EXTRA_OUTPUT_NAME = "extra_output_name"
                  const val EXTRA_OUTPUT_EXTENSION = "extra_output_extension"
                  const val EXTRA_USE_SOFTWARE_ENCODER = "extra_use_software_encoder"

                  private val _state = MutableStateFlow<ConvertState>(ConvertState.Idle)
                  val state: StateFlow<ConvertState> = _state.asStateFlow()
              }

              private val progressRunnable = object : Runnable {
                  override fun run() {
                      val progressState = transformer?.getProgress(progressHolder)
                      if (progressState == Transformer.PROGRESS_STATE_AVAILABLE) {
                          _state.value = ConvertState.Converting(progressHolder.progress)
                          updateNotification("Converting: ${progressHolder.progress}%", progressHolder.progress, false)
                          progressHandler.postDelayed(this, 300)
                      } else if (progressState != Transformer.PROGRESS_STATE_NOT_STARTED) {
                          progressHandler.postDelayed(this, 300)
                      }
                  }
              }

              override fun onCreate() {
                  super.onCreate()
                  createNotificationChannel()
                  installCrashSafetyNet()
              }

              /**
               * Transformer does its actual encoding work on internal background threads (codec
               * callback threads, GL threads for effects, etc.) that are outside the coroutine
               * try/catch below. An uncaught Throwable on any of those threads (e.g. an
               * OutOfMemoryError from codec buffers, or an IOException from running out of disk
               * space while writing a large output file) would otherwise kill the whole process.
               * This handler intercepts those, fails the conversion gracefully instead, and only
               * falls back to the previous default handler for threads unrelated to this service.
               */
              private fun installCrashSafetyNet() {
                  val previousHandler = Thread.getDefaultUncaughtExceptionHandler()
                  Thread.setDefaultUncaughtExceptionHandler { thread, throwable ->
                      if (isRunning) {
                          val message = when (throwable) {
                              is OutOfMemoryError -> "Out of memory — try a smaller video or free up device memory"
                              is IOException -> "Storage error during conversion — check available free space"
                              else -> throwable.message ?: "Conversion crashed unexpectedly"
                          }
                          try {
                              _state.value = ConvertState.Failed(message)
                              updateNotification("Failed: $message", 0, false)
                              outputMp4File?.delete()
                              releaseWakeLock()
                              isRunning = false
                              currentJob?.cancel()
                              transformer?.cancel()
                          } catch (inner: Throwable) {
                              // Best-effort cleanup only; fall through to the previous handler below.
                          }
                      }
                      previousHandler?.uncaughtException(thread, throwable)
                  }
              }

              override fun onBind(intent: Intent?): IBinder? = null

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  if (intent?.action == ACTION_CANCEL) {
                      cancelConversion()
                      return START_NOT_STICKY
                  }

                  if (intent?.action == ACTION_START && !isRunning) {
                      val inputUri = intent.getInputUriExtra(EXTRA_INPUT_URI)
                      if (inputUri == null) {
                          stopSelf()
                          return START_NOT_STICKY
                      }
                      val outputName = intent.getStringExtra(EXTRA_OUTPUT_NAME) ?: "converted_${System.currentTimeMillis()}"
                      val outputExtension = intent.getStringExtra(EXTRA_OUTPUT_EXTENSION) ?: "mp4"
                      val useSoftwareEncoder = intent.getBooleanExtra(EXTRA_USE_SOFTWARE_ENCODER, false)

                      isRunning = true
                      _state.value = ConvertState.Converting(0)
                      startForegroundWithNotification(buildNotification("Starting conversion...", 0, true))
                      acquireWakeLock()

                      val workDir = getExternalFilesDir(Environment.DIRECTORY_MOVIES)
                      val mp4File = File(workDir, "$outputName.mp4")
                      outputMp4File = mp4File

                      // Preflight: bail out cleanly if there isn't enough free space for the
                      // output file, instead of letting the encoder crash mid-write on a large
                      // file. Assume worst case the output can be as large as the input.
                      val inputSizeBytes = querySize(inputUri) ?: 0L
                      val freeSpaceBytes = workDir?.freeSpace ?: -1L
                      val requiredBytes = inputSizeBytes + 200L * 1024 * 1024
                      if (inputSizeBytes > 0 && freeSpaceBytes >= 0 && freeSpaceBytes < requiredBytes) {
                          _state.value = ConvertState.Failed("Not enough free storage space to convert this file")
                          updateNotification("Failed: Not enough free storage space", 0, false)
                          isRunning = false
                          releaseWakeLock()
                          stopForeground(STOP_FOREGROUND_DETACH)
                          stopSelf()
                          return START_NOT_STICKY
                      }

                      currentJob = serviceScope.launch {
                          try {
                              withContext(Dispatchers.Main) {
                                  runTransform(inputUri, mp4File, outputName, outputExtension, useSoftwareEncoder)
                              }
                          } catch (e: CancellationException) {
                              // Cancellation is already handled synchronously by cancelConversion().
                          } catch (e: Throwable) {
                              val message = if (e is OutOfMemoryError) {
                                  "Out of memory — try a smaller video or free up device memory"
                              } else {
                                  e.message ?: "Unknown error"
                              }
                              _state.value = ConvertState.Failed(message)
                              updateNotification("Failed: $message", 0, false)
                              finishService()
                          }
                      }
                  }
                  return START_NOT_STICKY
              }

              private fun cancelConversion() {
                  if (!isRunning) return
                  currentJob?.cancel()
                  transformer?.cancel()
                  progressHandler.removeCallbacks(progressRunnable)
                  outputMp4File?.delete()
                  _state.value = ConvertState.Cancelled
                  getSystemService(NotificationManager::class.java)
                      .notify(NOTIFICATION_ID, buildFinalNotification("Conversion cancelled"))
                  finishService()
              }

              private fun runTransform(
                  inputUri: Uri,
                  mp4File: File,
                  outputName: String,
                  outputExtension: String,
                  useSoftwareEncoder: Boolean
              ) {
                  val mediaItem = MediaItem.fromUri(inputUri)
                  val editedMediaItem = EditedMediaItem.Builder(mediaItem).build()
                  val displayName = "$outputName.$outputExtension"

                  // Hardware (MediaCodec HAL) encoding is faster and lighter on battery, but on
                  // some devices a vendor driver bug will crash the whole process natively when
                  // fed a large/unusual input — a crash that never reaches Kotlin's exception
                  // handlers. Software encoding runs entirely in-process, trading speed for
                  // reliability. The user picks per-conversion via the toggle in MainActivity.
                  val encoderSelector = if (useSoftwareEncoder) {
                      EncoderSelector { mimeType ->
                          EncoderSelector.DEFAULT.selectEncoderInfos(mimeType)
                              .filter { isSoftwareCodec(it) }
                      }
                  } else {
                      EncoderSelector.DEFAULT
                  }
                  val encoderFactory = DefaultEncoderFactory.Builder(this)
                      .setEncoderSelector(encoderSelector)
                      .setEnableFallback(!useSoftwareEncoder)
                      .build()

                  val newTransformer = Transformer.Builder(this)
                      .setVideoMimeType(MimeTypes.VIDEO_H264)
                      .setAudioMimeType(MimeTypes.AUDIO_AAC)
                      .setEncoderFactory(encoderFactory)
                      .addListener(object : Transformer.Listener {
                          override fun onCompleted(composition: Composition, result: ExportResult) {
                              if (!isRunning) return
                              serviceScope.launch {
                                  val downloadsUri = try {
                                      withContext(Dispatchers.IO) {
                                          val uri = saveToDownloads(mp4File, displayName)
                                          mp4File.delete()
                                          uri
                                      }
                                  } catch (e: Exception) {
                                      null
                                  }
                                  withContext(Dispatchers.Main) {
                                      if (!isRunning) return@withContext
                                      if (downloadsUri != null) {
                                          _state.value = ConvertState.Completed(downloadsUri.toString(), displayName)
                                          getSystemService(NotificationManager::class.java)
                                              .notify(NOTIFICATION_ID, buildFinalNotification("Saved $displayName to Downloads"))
                                      } else {
                                          _state.value = ConvertState.Failed("Converted but couldn't save to Downloads")
                                          getSystemService(NotificationManager::class.java)
                                              .notify(NOTIFICATION_ID, buildFinalNotification("Failed to save to Downloads"))
                                      }
                                      finishService()
                                  }
                              }
                          }

                          override fun onError(
                              composition: Composition,
                              result: ExportResult,
                              exception: ExportException
                          ) {
                              if (!isRunning) return
                              _state.value = ConvertState.Failed(exception.message ?: "Conversion failed")
                              getSystemService(NotificationManager::class.java)
                                  .notify(NOTIFICATION_ID, buildFinalNotification("Conversion failed: ${exception.message}"))
                              finishService()
                          }
                      })
                      .build()

                  transformer = newTransformer
                  newTransformer.start(editedMediaItem, mp4File.absolutePath)
                  progressHandler.post(progressRunnable)
              }

              private fun saveToDownloads(sourceFile: File, displayName: String): Uri? {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      val values = ContentValues().apply {
                          put(MediaStore.MediaColumns.DISPLAY_NAME, displayName)
                          put(MediaStore.MediaColumns.MIME_TYPE, "video/mp4")
                          put(MediaStore.MediaColumns.RELATIVE_PATH, Environment.DIRECTORY_DOWNLOADS)
                      }
                      val uri = contentResolver.insert(MediaStore.Downloads.EXTERNAL_CONTENT_URI, values) ?: return null
                      contentResolver.openOutputStream(uri)?.use { out ->
                          sourceFile.inputStream().use { it.copyTo(out) }
                      } ?: return null
                      return uri
                  } else {
                      val downloadsDir = Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOWNLOADS)
                      if (!downloadsDir.exists()) downloadsDir.mkdirs()
                      val destFile = File(downloadsDir, displayName)
                      sourceFile.inputStream().use { input ->
                          destFile.outputStream().use { output -> input.copyTo(output) }
                      }
                      MediaScannerConnection.scanFile(this, arrayOf(destFile.absolutePath), arrayOf("video/mp4"), null)
                      return Uri.fromFile(destFile)
                  }
              }

              private fun startForegroundWithNotification(notification: Notification) {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      startForeground(NOTIFICATION_ID, notification, ServiceInfo.FOREGROUND_SERVICE_TYPE_DATA_SYNC)
                  } else {
                      startForeground(NOTIFICATION_ID, notification)
                  }
              }

              private fun createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val channel = NotificationChannel(
                          CHANNEL_ID,
                          "Conversions",
                          NotificationManager.IMPORTANCE_LOW
                      ).apply {
                          description = "Shows video conversion progress"
                      }
                      getSystemService(NotificationManager::class.java).createNotificationChannel(channel)
                  }
              }

              private fun buildNotification(contentText: String, progress: Int, indeterminate: Boolean): Notification {
                  val openAppIntent = Intent(this, MainActivity::class.java).apply {
                      flags = Intent.FLAG_ACTIVITY_NEW_TASK or Intent.FLAG_ACTIVITY_CLEAR_TOP
                  }
                  val pendingIntent = PendingIntent.getActivity(
                      this, 0, openAppIntent,
                      PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE
                  )
                  return NotificationCompat.Builder(this, CHANNEL_ID)
                      .setContentTitle("Video Converter")
                      .setContentText(contentText)
                      .setSmallIcon(android.R.drawable.stat_sys_download)
                      .setProgress(100, progress, indeterminate)
                      .setOngoing(true)
                      .setOnlyAlertOnce(true)
                      .setContentIntent(pendingIntent)
                      .build()
              }

              private fun buildFinalNotification(contentText: String): Notification {
                  val openAppIntent = Intent(this, MainActivity::class.java).apply {
                      flags = Intent.FLAG_ACTIVITY_NEW_TASK or Intent.FLAG_ACTIVITY_CLEAR_TOP
                  }
                  val pendingIntent = PendingIntent.getActivity(
                      this, 0, openAppIntent,
                      PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE
                  )
                  return NotificationCompat.Builder(this, CHANNEL_ID)
                      .setContentTitle("Video Converter")
                      .setContentText(contentText)
                      .setSmallIcon(android.R.drawable.stat_sys_download_done)
                      .setOngoing(false)
                      .setAutoCancel(true)
                      .setContentIntent(pendingIntent)
                      .build()
              }

              private fun updateNotification(contentText: String, progress: Int, indeterminate: Boolean) {
                  val manager = getSystemService(NotificationManager::class.java)
                  manager.notify(NOTIFICATION_ID, buildNotification(contentText, progress, indeterminate))
              }

              private fun acquireWakeLock() {
                  val powerManager = getSystemService(POWER_SERVICE) as PowerManager
                  wakeLock = powerManager.newWakeLock(
                      PowerManager.PARTIAL_WAKE_LOCK,
                      "VideoConverter::ConvertWakeLock"
                  ).apply {
                      setReferenceCounted(false)
                      acquire(30 * 60 * 1000L)
                  }
              }

              private fun releaseWakeLock() {
                  if (wakeLock?.isHeld == true) wakeLock?.release()
                  wakeLock = null
              }

              private fun isSoftwareCodec(info: MediaCodecInfo): Boolean {
                  return if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      !info.isHardwareAccelerated
                  } else {
                      // isHardwareAccelerated() requires API 29+. On older devices, fall back to
                      // the well-known naming convention: software codecs are "OMX.google.*" or
                      // "c2.android.*"; anything else (e.g. "OMX.qcom.*", "OMX.mtk.*") is a
                      // vendor hardware codec.
                      val name = info.name.lowercase(Locale.US)
                      name.startsWith("omx.google.") || name.startsWith("c2.android.")
                  }
              }

              private fun querySize(uri: Uri): Long? {
                  return try {
                      contentResolver.query(uri, arrayOf(OpenableColumns.SIZE), null, null, null)?.use { cursor ->
                          val sizeIndex = cursor.getColumnIndex(OpenableColumns.SIZE)
                          if (sizeIndex >= 0 && cursor.moveToFirst() && !cursor.isNull(sizeIndex)) {
                              cursor.getLong(sizeIndex)
                          } else {
                              null
                          }
                      }
                  } catch (e: Exception) {
                      null
                  }
              }

              private fun finishService() {
                  progressHandler.removeCallbacks(progressRunnable)
                  releaseWakeLock()
                  isRunning = false
                  currentJob = null
                  stopForeground(STOP_FOREGROUND_DETACH)
                  stopSelf()
              }

              override fun onDestroy() {
                  super.onDestroy()
                  progressHandler.removeCallbacks(progressRunnable)
                  serviceJob.cancel()
                  releaseWakeLock()
                  transformer = null
                  currentJob = null
                  isRunning = false
              }
          }
          CONVERT_SERVICE

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: video-converter-debug-apk
          path: app/build/outputs/apk/debug/*.apk
