name: Build Video Trim APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/example/videotrim
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

      - name: Write settings.gradle
        run: |
          cat > settings.gradle <<'SETTINGS_GRADLE'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          rootProject.name = "VideoTrim"
          include ':app'
          SETTINGS_GRADLE

      - name: Write root build.gradle
        run: |
          cat > build.gradle <<'ROOT_BUILD_GRADLE'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.5.2'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.24'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          ROOT_BUILD_GRADLE

      - name: Write gradle.properties
        run: |
          cat > gradle.properties <<'GRADLE_PROPERTIES'
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          kotlin.code.style=official
          org.gradle.jvmargs=-Xmx2048m
          GRADLE_PROPERTIES

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Write app build.gradle
        run: |
          cat > app/build.gradle <<'APP_BUILD_GRADLE'
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'

          android {
              namespace 'com.example.videotrim'
              compileSdk 35

              defaultConfig {
                  applicationId "com.example.videotrim"
                  minSdk 29
                  targetSdk 35
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  debug {}
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }

              buildFeatures {
                  viewBinding true
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.13.1'
              implementation 'androidx.appcompat:appcompat:1.7.0'
              implementation 'com.google.android.material:material:1.12.0'
              implementation 'androidx.activity:activity-ktx:1.9.0'
              implementation 'androidx.media3:media3-transformer:1.4.1'
              implementation 'androidx.media3:media3-common:1.4.1'
              implementation 'androidx.media3:media3-effect:1.4.1'
              implementation 'androidx.media3:media3-exoplayer:1.4.1'
              implementation 'androidx.media3:media3-ui:1.4.1'
          }
          APP_BUILD_GRADLE

      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml <<'ANDROID_MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PROCESSING" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />

              <application
                  android:allowBackup="true"
                  android:icon="@android:drawable/sym_def_app_icon"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.VideoTrim">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:supportsPictureInPicture="true"
                      android:resizeableActivity="true"
                      android:configChanges="screenSize|smallestScreenSize|screenLayout|orientation">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".ExportService"
                      android:exported="false"
                      android:foregroundServiceType="mediaProcessing" />
              </application>
          </manifest>
          ANDROID_MANIFEST

      - name: Write strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml <<'STRINGS_XML'
          <resources>
              <string name="app_name">Video Trim</string>
          </resources>
          STRINGS_XML

      - name: Write themes.xml
        run: |
          cat > app/src/main/res/values/themes.xml <<'THEMES_XML'
          <resources>
              <style name="Theme.VideoTrim" parent="Theme.Material3.DayNight.NoActionBar" />
          </resources>
          THEMES_XML

      - name: Write activity_main.xml
        run: |
          cat > app/src/main/res/layout/activity_main.xml <<'ACTIVITY_MAIN_XML'
          <?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:id="@+id/rootScroll"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:clipToPadding="false">

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:padding="16dp">

                  <LinearLayout
                      android:id="@+id/topControls"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="vertical">

                      <Button
                          android:id="@+id/buttonSelectVideo"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:text="Select Video" />

                      <TextView
                          android:id="@+id/textSelectedFile"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:layout_marginTop="8dp"
                          android:text="No video selected" />
                  </LinearLayout>

                  <TextView
                      android:id="@+id/textPlayerLabel"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="8dp"
                      android:visibility="gone" />

                  <FrameLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="4dp">

                      <androidx.media3.ui.PlayerView
                          android:id="@+id/playerView"
                          android:layout_width="match_parent"
                          android:layout_height="220dp"
                          android:visibility="gone"
                          app:use_controller="true" />

                      <ImageButton
                          android:id="@+id/buttonPip"
                          android:layout_width="40dp"
                          android:layout_height="40dp"
                          android:layout_gravity="top|end"
                          android:layout_margin="8dp"
                          android:background="#66000000"
                          android:contentDescription="Picture in Picture"
                          android:padding="8dp"
                          android:src="@android:drawable/ic_menu_crop"
                          android:visibility="gone" />
                  </FrameLayout>

                  <LinearLayout
                      android:id="@+id/bottomControls"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="vertical">

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="16dp"
                      android:orientation="horizontal">

                      <EditText
                          android:id="@+id/editStart"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:hint="Start (seconds)"
                          android:inputType="numberDecimal" />

                      <Button
                          android:id="@+id/buttonSetStart"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:layout_marginStart="8dp"
                          android:text="Set" />
                  </LinearLayout>

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="8dp"
                      android:orientation="horizontal">

                      <EditText
                          android:id="@+id/editEnd"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:hint="End (seconds)"
                          android:inputType="numberDecimal" />

                      <Button
                          android:id="@+id/buttonSetEnd"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:layout_marginStart="8dp"
                          android:text="Set" />
                  </LinearLayout>

                  <EditText
                      android:id="@+id/editHeight"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="16dp"
                      android:hint="Target height in px, blank for original"
                      android:inputType="number" />

                  <EditText
                      android:id="@+id/editWidth"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="8dp"
                      android:hint="Target width in px, blank to keep aspect ratio"
                      android:inputType="number" />

                  <EditText
                      android:id="@+id/editBitrate"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="8dp"
                      android:hint="Target bitrate in bps, blank for original"
                      android:inputType="number" />

                  <Button
                      android:id="@+id/buttonProcess"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="16dp"
                      android:text="Cut and Export" />

                  <ProgressBar
                      android:id="@+id/progressBar"
                      style="@android:style/Widget.ProgressBar.Horizontal"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="16dp"
                      android:max="100"
                      android:visibility="gone" />

                  <TextView
                      android:id="@+id/textStatus"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="16dp" />

                  </LinearLayout>

              </LinearLayout>
          </ScrollView>
          ACTIVITY_MAIN_XML

      - name: Write MainActivity.kt
        run: |
          cat > app/src/main/java/com/example/videotrim/MainActivity.kt <<'MAIN_ACTIVITY'
          package com.example.videotrim

          import android.Manifest
          import android.app.PendingIntent
          import android.app.PictureInPictureParams
          import android.app.RemoteAction
          import android.content.BroadcastReceiver
          import android.content.Context
          import android.content.Intent
          import android.content.IntentFilter
          import android.content.pm.PackageManager
          import android.graphics.drawable.Icon
          import android.net.Uri
          import android.os.Build
          import android.os.Bundle
          import android.view.View
          import android.widget.Toast
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.content.ContextCompat
          import androidx.core.view.ViewCompat
          import androidx.core.view.WindowInsetsCompat
          import androidx.media3.common.MediaItem
          import androidx.media3.common.Player
          import androidx.media3.exoplayer.ExoPlayer
          import com.example.videotrim.databinding.ActivityMainBinding

          class MainActivity : AppCompatActivity() {

              companion object {
                  private const val ACTION_PLAY_PAUSE = "com.example.videotrim.PIP_PLAY_PAUSE"
                  private const val ACTION_REWIND = "com.example.videotrim.PIP_REWIND"
                  private const val ACTION_FORWARD = "com.example.videotrim.PIP_FORWARD"
                  private const val SEEK_MS = 10000L
                  private const val REQUEST_PLAY_PAUSE = 1
                  private const val REQUEST_REWIND = 2
                  private const val REQUEST_FORWARD = 3
              }

              private lateinit var binding: ActivityMainBinding
              private var selectedUri: Uri? = null
              private var player: ExoPlayer? = null
              private var pipReceiverRegistered = false
              private var exportReceiverRegistered = false

              private val pipActionReceiver = object : BroadcastReceiver() {
                  override fun onReceive(context: Context?, intent: Intent?) {
                      val currentPlayer = player ?: return
                      when (intent?.action) {
                          ACTION_PLAY_PAUSE -> currentPlayer.playWhenReady = !currentPlayer.playWhenReady
                          ACTION_REWIND -> currentPlayer.seekTo(
                              (currentPlayer.currentPosition - SEEK_MS).coerceAtLeast(0)
                          )
                          ACTION_FORWARD -> currentPlayer.seekTo(
                              (currentPlayer.currentPosition + SEEK_MS).coerceAtMost(currentPlayer.duration.coerceAtLeast(0))
                          )
                      }
                      updatePipActions()
                  }
              }

              private val exportStatusReceiver = object : BroadcastReceiver() {
                  override fun onReceive(context: Context?, intent: Intent?) {
                      when (intent?.action) {
                          ExportService.BROADCAST_PROGRESS -> {
                              val progress = intent.getIntExtra(ExportService.EXTRA_PROGRESS, 0)
                              binding.progressBar.visibility = View.VISIBLE
                              binding.progressBar.progress = progress
                              binding.textStatus.text = "$progress%"
                          }
                          ExportService.BROADCAST_COMPLETE -> {
                              binding.progressBar.visibility = View.GONE
                              val resultUri = intent.getParcelableExtra<Uri>(ExportService.EXTRA_RESULT_URI)
                              val outputName = intent.getStringExtra(ExportService.EXTRA_OUTPUT_NAME)
                              binding.textStatus.text = "Saved to Download/$outputName"
                              if (resultUri != null) {
                                  previewVideo(resultUri, "Preview: trimmed result")
                              }
                          }
                          ExportService.BROADCAST_ERROR -> {
                              binding.progressBar.visibility = View.GONE
                              val message = intent.getStringExtra(ExportService.EXTRA_ERROR_MESSAGE)
                              binding.textStatus.text = "Error: $message"
                          }
                      }
                  }
              }

              private val notificationPermissionLauncher =
                  registerForActivityResult(ActivityResultContracts.RequestPermission()) { }

              private val pickVideoLauncher =
                  registerForActivityResult(ActivityResultContracts.GetContent()) { uri: Uri? ->
                      if (uri != null) {
                          selectedUri = uri
                          binding.textSelectedFile.text = uri.toString()
                          previewVideo(uri, "Preview: original")
                      }
                  }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityMainBinding.inflate(layoutInflater)
                  setContentView(binding.root)

                  ViewCompat.setOnApplyWindowInsetsListener(binding.root) { view, insets ->
                      val systemBars = insets.getInsets(WindowInsetsCompat.Type.systemBars())
                      view.setPadding(
                          systemBars.left + view.paddingLeft,
                          systemBars.top,
                          systemBars.right + view.paddingRight,
                          systemBars.bottom
                      )
                      insets
                  }

                  val filter = IntentFilter().apply {
                      addAction(ACTION_PLAY_PAUSE)
                      addAction(ACTION_REWIND)
                      addAction(ACTION_FORWARD)
                  }
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      registerReceiver(pipActionReceiver, filter, Context.RECEIVER_NOT_EXPORTED)
                  } else {
                      ContextCompat.registerReceiver(this, pipActionReceiver, filter, ContextCompat.RECEIVER_NOT_EXPORTED)
                  }
                  pipReceiverRegistered = true

                  val exportFilter = IntentFilter().apply {
                      addAction(ExportService.BROADCAST_PROGRESS)
                      addAction(ExportService.BROADCAST_COMPLETE)
                      addAction(ExportService.BROADCAST_ERROR)
                  }
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      registerReceiver(exportStatusReceiver, exportFilter, Context.RECEIVER_NOT_EXPORTED)
                  } else {
                      ContextCompat.registerReceiver(this, exportStatusReceiver, exportFilter, ContextCompat.RECEIVER_NOT_EXPORTED)
                  }
                  exportReceiverRegistered = true

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU &&
                      ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS)
                      != PackageManager.PERMISSION_GRANTED
                  ) {
                      notificationPermissionLauncher.launch(Manifest.permission.POST_NOTIFICATIONS)
                  }

                  binding.buttonSelectVideo.setOnClickListener {
                      pickVideoLauncher.launch("video/*")
                  }

                  binding.buttonSetStart.setOnClickListener {
                      player?.let { binding.editStart.setText((it.currentPosition / 1000.0).toString()) }
                  }

                  binding.buttonSetEnd.setOnClickListener {
                      player?.let { binding.editEnd.setText((it.currentPosition / 1000.0).toString()) }
                  }

                  binding.buttonProcess.setOnClickListener {
                      processVideo()
                  }

                  binding.buttonPip.setOnClickListener {
                      enterPictureInPictureMode(buildPipParams())
                  }
              }

              private fun pipRemoteAction(iconResId: Int, title: String, action: String, requestCode: Int): RemoteAction {
                  val intent = Intent(action).setPackage(packageName)
                  val pendingIntent = PendingIntent.getBroadcast(
                      this,
                      requestCode,
                      intent,
                      PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE
                  )
                  return RemoteAction(Icon.createWithResource(this, iconResId), title, title, pendingIntent)
              }

              private fun buildPipParams(): PictureInPictureParams {
                  val isPlaying = player?.playWhenReady == true
                  val playPauseIcon = if (isPlaying) android.R.drawable.ic_media_pause else android.R.drawable.ic_media_play
                  val actions = listOf(
                      pipRemoteAction(android.R.drawable.ic_media_rew, "Rewind", ACTION_REWIND, REQUEST_REWIND),
                      pipRemoteAction(playPauseIcon, "Play/Pause", ACTION_PLAY_PAUSE, REQUEST_PLAY_PAUSE),
                      pipRemoteAction(android.R.drawable.ic_media_ff, "Forward", ACTION_FORWARD, REQUEST_FORWARD)
                  )
                  return PictureInPictureParams.Builder().setActions(actions).build()
              }

              private fun updatePipActions() {
                  if (isInPictureInPictureMode) {
                      setPictureInPictureParams(buildPipParams())
                  }
              }

              private fun previewVideo(uri: Uri, label: String) {
                  player?.release()
                  val exoPlayer = ExoPlayer.Builder(this).build()
                  exoPlayer.setMediaItem(MediaItem.fromUri(uri))
                  exoPlayer.prepare()
                  exoPlayer.addListener(object : Player.Listener {
                      override fun onIsPlayingChanged(isPlaying: Boolean) {
                          updatePipActions()
                      }
                  })
                  binding.playerView.player = exoPlayer
                  binding.playerView.visibility = View.VISIBLE
                  binding.buttonPip.visibility = View.VISIBLE
                  binding.textPlayerLabel.text = label
                  binding.textPlayerLabel.visibility = View.VISIBLE
                  player = exoPlayer
              }

              private fun processVideo() {
                  val uri = selectedUri
                  if (uri == null) {
                      Toast.makeText(this, "Select a video first", Toast.LENGTH_SHORT).show()
                      return
                  }

                  val startSeconds = binding.editStart.text.toString().toDoubleOrNull()
                  val endSeconds = binding.editEnd.text.toString().toDoubleOrNull()

                  if (startSeconds == null || endSeconds == null || endSeconds <= startSeconds) {
                      Toast.makeText(this, "Enter a valid start and end time", Toast.LENGTH_SHORT).show()
                      return
                  }

                  val startMs = (startSeconds * 1000).toLong()
                  val endMs = (endSeconds * 1000).toLong()

                  val targetHeight = binding.editHeight.text.toString().toIntOrNull()
                  val targetWidth = binding.editWidth.text.toString().toIntOrNull()
                  val targetBitrate = binding.editBitrate.text.toString().toIntOrNull()

                  val outputName = "trimmed_${System.currentTimeMillis()}.mp4"

                  binding.progressBar.visibility = View.VISIBLE
                  binding.progressBar.progress = 0
                  binding.textStatus.text = "0%"

                  val serviceIntent = Intent(this, ExportService::class.java).apply {
                      action = ExportService.ACTION_START
                      putExtra(ExportService.EXTRA_URI, uri)
                      putExtra(ExportService.EXTRA_START_MS, startMs)
                      putExtra(ExportService.EXTRA_END_MS, endMs)
                      putExtra(ExportService.EXTRA_WIDTH, targetWidth ?: -1)
                      putExtra(ExportService.EXTRA_HEIGHT, targetHeight ?: -1)
                      putExtra(ExportService.EXTRA_BITRATE, targetBitrate ?: -1)
                      putExtra(ExportService.EXTRA_OUTPUT_NAME, outputName)
                  }
                  ContextCompat.startForegroundService(this, serviceIntent)
              }

              override fun onStop() {
                  super.onStop()
                  player?.pause()
              }

              override fun onDestroy() {
                  super.onDestroy()
                  if (pipReceiverRegistered) {
                      unregisterReceiver(pipActionReceiver)
                      pipReceiverRegistered = false
                  }
                  if (exportReceiverRegistered) {
                      unregisterReceiver(exportStatusReceiver)
                      exportReceiverRegistered = false
                  }
                  player?.release()
                  player = null
              }
          }
          MAIN_ACTIVITY

      - name: Write ExportService.kt
        run: |
          cat > app/src/main/java/com/example/videotrim/ExportService.kt <<'EXPORT_SERVICE'
          package com.example.videotrim

          import android.app.Notification
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.app.Service
          import android.content.ContentValues
          import android.content.Context
          import android.content.Intent
          import android.net.Uri
          import android.os.Build
          import android.os.Environment
          import android.os.Handler
          import android.os.IBinder
          import android.os.Looper
          import android.provider.MediaStore
          import androidx.core.app.NotificationCompat
          import androidx.media3.common.MediaItem
          import androidx.media3.common.MimeTypes
          import androidx.media3.effect.Presentation
          import androidx.media3.transformer.Composition
          import androidx.media3.transformer.DefaultEncoderFactory
          import androidx.media3.transformer.EditedMediaItem
          import androidx.media3.transformer.Effects
          import androidx.media3.transformer.ExportException
          import androidx.media3.transformer.ExportResult
          import androidx.media3.transformer.ProgressHolder
          import androidx.media3.transformer.Transformer
          import androidx.media3.transformer.VideoEncoderSettings
          import java.io.File

          class ExportService : Service() {

              companion object {
                  const val ACTION_START = "com.example.videotrim.action.START_EXPORT"
                  const val EXTRA_URI = "extra_uri"
                  const val EXTRA_START_MS = "extra_start_ms"
                  const val EXTRA_END_MS = "extra_end_ms"
                  const val EXTRA_WIDTH = "extra_width"
                  const val EXTRA_HEIGHT = "extra_height"
                  const val EXTRA_BITRATE = "extra_bitrate"
                  const val EXTRA_OUTPUT_NAME = "extra_output_name"

                  const val BROADCAST_PROGRESS = "com.example.videotrim.EXPORT_PROGRESS"
                  const val BROADCAST_COMPLETE = "com.example.videotrim.EXPORT_COMPLETE"
                  const val BROADCAST_ERROR = "com.example.videotrim.EXPORT_ERROR"
                  const val EXTRA_PROGRESS = "extra_progress"
                  const val EXTRA_RESULT_URI = "extra_result_uri"
                  const val EXTRA_ERROR_MESSAGE = "extra_error_message"

                  private const val CHANNEL_ID = "export_progress"
                  private const val NOTIFICATION_ID = 42
              }

              private var transformer: Transformer? = null
              private val progressHolder = ProgressHolder()
              private val progressHandler = Handler(Looper.getMainLooper())
              private lateinit var notificationManager: NotificationManager

              private val progressRunnable = object : Runnable {
                  override fun run() {
                      val state = transformer?.getProgress(progressHolder)
                      if (state == Transformer.PROGRESS_STATE_AVAILABLE) {
                          updateNotification(progressHolder.progress)
                          broadcastProgress(progressHolder.progress)
                          progressHandler.postDelayed(this, 300)
                      } else if (state != Transformer.PROGRESS_STATE_NOT_STARTED) {
                          progressHandler.postDelayed(this, 300)
                      }
                  }
              }

              override fun onCreate() {
                  super.onCreate()
                  notificationManager = getSystemService(Context.NOTIFICATION_SERVICE) as NotificationManager
                  createChannel()
              }

              override fun onBind(intent: Intent?): IBinder? = null

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  if (intent == null || intent.action != ACTION_START) {
                      stopSelf()
                      return START_NOT_STICKY
                  }

                  startForeground(NOTIFICATION_ID, buildProgressNotification(0))

                  val uri = intent.getParcelableExtra<Uri>(EXTRA_URI)
                  val startMs = intent.getLongExtra(EXTRA_START_MS, 0L)
                  val endMs = intent.getLongExtra(EXTRA_END_MS, 0L)
                  val width = intent.getIntExtra(EXTRA_WIDTH, -1).takeIf { it > 0 }
                  val height = intent.getIntExtra(EXTRA_HEIGHT, -1).takeIf { it > 0 }
                  val bitrate = intent.getIntExtra(EXTRA_BITRATE, -1).takeIf { it > 0 }
                  val outputName = intent.getStringExtra(EXTRA_OUTPUT_NAME)
                      ?: "trimmed_${System.currentTimeMillis()}.mp4"

                  if (uri == null) {
                      stopSelf()
                      return START_NOT_STICKY
                  }

                  startExport(uri, startMs, endMs, width, height, bitrate, outputName)
                  return START_NOT_STICKY
              }

              private fun startExport(
                  uri: Uri,
                  startMs: Long,
                  endMs: Long,
                  width: Int?,
                  height: Int?,
                  bitrate: Int?,
                  outputName: String
              ) {
                  val file = File(cacheDir, outputName)

                  val clippingConfiguration = MediaItem.ClippingConfiguration.Builder()
                      .setStartPositionMs(startMs)
                      .setEndPositionMs(endMs)
                      .build()

                  val mediaItem = MediaItem.Builder()
                      .setUri(uri)
                      .setClippingConfiguration(clippingConfiguration)
                      .build()

                  val editedMediaItemBuilder = EditedMediaItem.Builder(mediaItem)

                  if (width != null && height != null) {
                      editedMediaItemBuilder.setEffects(
                          Effects(
                              emptyList(),
                              listOf(Presentation.createForWidthAndHeight(width, height, Presentation.LAYOUT_SCALE_TO_FIT))
                          )
                      )
                  } else if (height != null) {
                      editedMediaItemBuilder.setEffects(
                          Effects(emptyList(), listOf(Presentation.createForHeight(height)))
                      )
                  }

                  val transformerBuilder = Transformer.Builder(this)
                      .setVideoMimeType(MimeTypes.VIDEO_H264)
                      .addListener(object : Transformer.Listener {
                          override fun onCompleted(composition: Composition, result: ExportResult) {
                              progressHandler.removeCallbacks(progressRunnable)
                              val downloadsUri = saveToDownloads(file, outputName)
                              file.delete()
                              if (downloadsUri != null) {
                                  notificationManager.notify(
                                      NOTIFICATION_ID,
                                      buildFinalNotification("Export complete", "Saved to Download/$outputName")
                                  )
                                  broadcastComplete(downloadsUri, outputName)
                              } else {
                                  val message = "Saving to Downloads failed"
                                  notificationManager.notify(
                                      NOTIFICATION_ID,
                                      buildFinalNotification("Export finished", message)
                                  )
                                  broadcastError(message)
                              }
                              stopForeground(STOP_FOREGROUND_DETACH)
                              stopSelf()
                          }

                          override fun onError(
                              composition: Composition,
                              result: ExportResult,
                              exception: ExportException
                          ) {
                              progressHandler.removeCallbacks(progressRunnable)
                              val message = exception.message ?: "Unknown error"
                              notificationManager.notify(NOTIFICATION_ID, buildFinalNotification("Export failed", message))
                              broadcastError(message)
                              stopForeground(STOP_FOREGROUND_DETACH)
                              stopSelf()
                          }
                      })

                  if (bitrate != null) {
                      transformerBuilder.setEncoderFactory(
                          DefaultEncoderFactory.Builder(applicationContext)
                              .setRequestedVideoEncoderSettings(VideoEncoderSettings.Builder().setBitrate(bitrate).build())
                              .build()
                      )
                  }

                  val newTransformer = transformerBuilder.build()
                  transformer = newTransformer
                  newTransformer.start(editedMediaItemBuilder.build(), file.absolutePath)
                  progressHandler.post(progressRunnable)
              }

              private fun saveToDownloads(sourceFile: File, displayName: String): Uri? {
                  val values = ContentValues().apply {
                      put(MediaStore.MediaColumns.DISPLAY_NAME, displayName)
                      put(MediaStore.MediaColumns.MIME_TYPE, "video/mp4")
                      put(MediaStore.MediaColumns.RELATIVE_PATH, Environment.DIRECTORY_DOWNLOADS)
                  }
                  val itemUri = contentResolver.insert(MediaStore.Downloads.EXTERNAL_CONTENT_URI, values)
                      ?: return null
                  contentResolver.openOutputStream(itemUri)?.use { out ->
                      sourceFile.inputStream().use { input -> input.copyTo(out) }
                  }
                  return itemUri
              }

              private fun broadcastProgress(progress: Int) {
                  sendBroadcast(
                      Intent(BROADCAST_PROGRESS).setPackage(packageName).putExtra(EXTRA_PROGRESS, progress)
                  )
              }

              private fun broadcastComplete(resultUri: Uri, outputName: String) {
                  sendBroadcast(
                      Intent(BROADCAST_COMPLETE).setPackage(packageName)
                          .putExtra(EXTRA_RESULT_URI, resultUri)
                          .putExtra(EXTRA_OUTPUT_NAME, outputName)
                  )
              }

              private fun broadcastError(message: String) {
                  sendBroadcast(
                      Intent(BROADCAST_ERROR).setPackage(packageName).putExtra(EXTRA_ERROR_MESSAGE, message)
                  )
              }

              private fun createChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val channel = NotificationChannel(CHANNEL_ID, "Video export", NotificationManager.IMPORTANCE_LOW)
                      notificationManager.createNotificationChannel(channel)
                  }
              }

              private fun buildProgressNotification(progress: Int): Notification {
                  return NotificationCompat.Builder(this, CHANNEL_ID)
                      .setContentTitle("Exporting video")
                      .setContentText("$progress%")
                      .setSmallIcon(android.R.drawable.stat_sys_download)
                      .setProgress(100, progress, false)
                      .setOngoing(true)
                      .setOnlyAlertOnce(true)
                      .build()
              }

              private fun updateNotification(progress: Int) {
                  notificationManager.notify(NOTIFICATION_ID, buildProgressNotification(progress))
              }

              private fun buildFinalNotification(title: String, text: String): Notification {
                  return NotificationCompat.Builder(this, CHANNEL_ID)
                      .setContentTitle(title)
                      .setContentText(text)
                      .setSmallIcon(android.R.drawable.stat_sys_download_done)
                      .setAutoCancel(true)
                      .build()
              }

              override fun onDestroy() {
                  super.onDestroy()
                  progressHandler.removeCallbacks(progressRunnable)
                  transformer?.cancel()
                  transformer = null
              }
          }
          EXPORT_SERVICE

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: video-trim-debug-apk
          path: app/build/outputs/apk/debug/*.apk
